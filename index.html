<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base-path" content="">
    <title>Redirect – DI Prompt Library</title>
    <script>
        (function() {
            var base = document.querySelector('meta[name="base-path"]');
            base = base ? (base.getAttribute('content') || '') : '';
            if (base && base.slice(-1) === '/') base = base.slice(0, -1);
            if (base === '' && location.pathname && location.pathname !== '/') {
                base = location.pathname.replace(/\/index\.html?$/i, '').replace(/\/?$/, '') || '';
            }
            var lang = 'en';
            try {
                var stored = localStorage.getItem('lang');
                if (stored === 'lt' || stored === 'en') lang = stored;
                else if (typeof navigator !== 'undefined' && navigator.language && navigator.language.toLowerCase().indexOf('lt') === 0) lang = 'lt';
            } catch (e) {}
            var path = (base ? base + '/' : '/') + lang + '/';
            window.location.replace(path);
        })();
    </script>
</head>
<body>
    <p>Redirecting… <a href="lt/">Lietuvių</a> | <a href="en/">English</a></p>
</body>
</html>
